- name: "Payment"
  hosts: payment
  tasks:
  - name: "Installing python"
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - python3
    - gcc
    - python3-devel

  - name: "Creating user"
    ansible.builtin.user:
      name: roboshop
      home: /app
      system: true
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: "Creating directory"
    anisble.builtin.file:
      path: /app
      state: directory

  - name: "Downloading the code"
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip 
      dest: /tmp/payment.zip

  - name: "Unzip the files"
    ansible.builtin.unarchieve:
      src: /tmp/payment.zip
      dest: /app

  - name: install dependencie
    ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app

  - name: copy payment service
    ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: daemon reload
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: start enable payment
    ansible.builtin.service:
      name: payment
      state: restarted
      enabled: yes