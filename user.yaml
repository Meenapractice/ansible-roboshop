- name: "Create user"
  hosts: user
  become: yes
  tasks:
  - name: "Enable nodejs"
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: "Installing nodejs"
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: "Creating system user"
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: "Deleting the folder"
    ansible.builtin.file:
      path: /app
      state: absent

  - name: "Creating folder"
    ansible.builtin.file:
      path: /app
      state: directory

  - name: "Deleting the code"
    ansible.builtin.file:
      path: /tmp/user.zip
      state: absent

  - name: "Download user code"
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip 
      dest: /tmp/user.zip

  - name: unarchieve user
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

  - name: "Installing dependencies"
    community.general.npm:
      path: /app

  - name: "Copying the service file"
    ansible.builtin.template:
      src: user.service
      dest: /etc/systemd/system/user.service
  
  - name: "Daemon reload"
    ansible.builtin.systemd_service:
      daemon_reload: true
  
  - name: "Service start and enable"
    ansible.builtin.service:
      name: user
      state: restarted
      enabled: yes
    

  