- name: "MySql server"
  hosts: mysql
  tasks:
  - name: "Install mysql server"
    ansible.builtin.dnf:
      name: mysql
      state: present

  - name: "Enabling mysql service"
    ansible.builtin.service:
      name: mysqld
      state: restarted
      enabled: yes

  - name: "Setting password"
    anisble.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1
    
