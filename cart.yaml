- name: "Create cart"
  hosts: cart
  become: yes
  tasks:
  - name: "Enable nodejs"
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: "Installing nodejs"
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: "Creating system cart"
    ansible.builtin.cart:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system cart"

  - name: "Deleting the folder"
    ansible.builtin.file:
      path: /app
      state: absent

  - name: "Creating folder"
    ansible.builtin.file:
      path: /app
      state: directory

  - name: "Deleting the code"
    ansible.builtin.file:
      path: /tmp/cart.zip
      state: absent

  - name: "Download cart code"
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip 
      dest: /tmp/cart.zip

  - name: unarchieve cart
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes

  - name: "Installing dependencies"
    community.general.npm:
      path: /app

  - name: "Copying the service file"
    ansible.builtin.template:
      src: cart.service
      dest: /etc/systemd/system/cart.service
  
  - name: "Daemon reload"
    ansible.builtin.systemd_service:
      daemon_reload: true
  
  - name: "Service start and enable"
    ansible.builtin.service:
      name: cart
      state: restarted
      enabled: yes
    

  