- name: "Create catalogue"
  hosts: catalogue
  become: yes
  tasks:
  - name: "Enable nodejs"
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: "Installing nodejs"
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: "Creating system user"
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: "Deleting the folder"
    ansible.builtin.file:
      path: /app
      state: absent

  - name: "Creating folder"
    ansible.builtin.file:
      path: /app
      state: directory

  - name: "Deleting the code"
    ansible.builtin.file:
      path: /tmp/catalogue.zip
      state: absent

  - name: "Download catalogue code"
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip

  - name: unarchieve catalogue
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: "Installing dependencies"
    community.general.npm:
      name: npm

  - name: "Copying the service file"
    ansible.builtin.template:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service
  
  - name: "Daemon reload"
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: "Copying repo"
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: "Installing mysql"
    ansible.builtin.dnf:
      name: mongodb-mongosh
      state: present

  - name: "Checking products"
    ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: product_output

  - name: "load products"
    ansible.builtin.shell: mongosh --host {{ MONGODB_HOST }} </app/db/master-data.js
    when: product_output.stdout | int < 0
  
  - name: "Service start and enable"
    ansible.builtin.service:
      name: catalogue
      state: restarted
      enabled: yes
    

  